<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Das mobile Mörderspiel – Assassin für Gruppen">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mörderspiel">
  <meta name="theme-color" content="#0F0F0F">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Mörderspiel</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0F0F0F;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      overflow: hidden;
    }

    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #splash img {
      width: 110px;
      height: 110px;
      border-radius: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 12px #B71C1C88); }
      50%       { transform: scale(1.07); filter: drop-shadow(0 0 28px #B71C1Ccc); }
    }

    #splash h1 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid #333;
      border-top-color: #B71C1C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <img src="icons/Icon-512.png" alt="Mörderspiel">
    <h1>Mörderspiel</h1>
    <div class="spinner"></div>
  </div>
  <script src="push.js"></script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      // Wait for Flutter to finish navigating from /splash to /home before fading out
      setTimeout(function () {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.style.transition = 'opacity 0.4s ease';
          splash.style.opacity = '0';
          setTimeout(function () { splash.remove(); }, 400);
        }
      }, 600);
    });
  </script>
</body>
</html>
